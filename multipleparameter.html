<!DOCTYPE html>

  <title>function calls here multiple times </title>
</head>
<body>
  <script>
/*agr function ki multiple values chahiye ho toh function ko multiple time kar lo mtlb bar bar console mai likho values */
  function sum(a,b)
{
let sum=a+b;
return sum;
} 
console.log(sum(4,5));
console.log(sum(41,55));
console.log(sum(0,5));
console.log(sum(1,-1));
console.log(sum(6,9.8));

  </script>
</body>
