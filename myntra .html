<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="myntra.css">
  <title>Myntra bag </title>
</head>

<body>  
    
      <button class="Bag-button" onclick=" cartQuantity=cartQuantity+1;
   document.querySelector('#cart-summary').
  innerText=`Your Bag has ${cartQuantity} items`;
  ">Add to Bag</button>

    <button class="wish-button" onclick=" cartQuantity=cartQuantity-1;
  document.querySelector('#cart-summary').
  innerText=`Your Bag has ${cartQuantity} items`;
  ">Move to Wishlist</button>

    <button class="Bag-button"
    onclick="cartQuantity = cartQuantity+2;
document.querySelector('#cart-summary').
innerText=`Your Bag has ${cartQuantity} items`;
  ">Add  1+1  sales item</button>

<h1 id="cart-summary">Your Bag has 0 items</h1>
<script>
  let cartQuantity = 0;
  document.querySelector('#cart-summary')
  innerText=`Your Bag has ${cartQuantity} items`;
</script>

</body>
</html>
