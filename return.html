  <script>
    
/*ab agr age define kar doon aur sbke sath return likh doon curly braces mai toh poore functions ka answer aayega jinke sath return likha hai*/

let age=34;

  return 'aap avtaar hain';
}
console.log('Checking drive status');

  return 'You can drive';
}
else{
  return'Use a Bicycle'
}
}
console.log(determineDriveStatus());
